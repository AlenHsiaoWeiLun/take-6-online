services:
  - type: web
    name: take6-online
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: FAI_PYTHON_BIN
        value: python3
      - key: FAI_AGENT_ROOT
        value: .
      - key: FAI_AGENT_MODULE
        value: server.agents.rl6_nimmt_adapter
      - key: FAI_AGENT_CLASS
        value: RL6NimmtAgentAdapter
      - key: FAI_AGENT_ARGS
        value: '{"repo_root":"./vendor/rl-6-nimmt","agent_name":"mcts","agent_kwargs":{"mc_per_card":3,"mc_max":30}}'
      - key: FAI_AGENT_TIMEOUT_MS
        value: "5000"
